services:
  - type: web
    name: mima-panel
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  - type: web
    name: mima-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/telegram_bot.py
