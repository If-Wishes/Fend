<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | User Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>.hidden-dropdown{display:none;}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right"><p class="text-sm font-medium" id="adminName">Admin</p><p class="text-xs text-gray-500">Activities</p></div>
                <div class="relative"><button id="menuBtn" class="bg-gray-100 rounded-full px-3 py-2"><i class="fas fa-user-shield"></i><i class="fas fa-chevron-down text-xs"></i></button>
                <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                    <a href="dashboard.html" class="block px-4 py-2">Dashboard</a><a href="users.html" class="block px-4 py-2">Users</a>
                    <a href="analytics.html" class="block px-4 py-2">Number Allocation</a><a href="activities.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">User Activities</a>
                    <div class="border-t"></div><a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                </div></div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold">User Activities</h1>
    <p class="text-gray-500 mb-6">View all users' OTPs and earnings</p>
    
    <div class="bg-white rounded-2xl border p-4 mb-6 flex gap-4 items-center">
        <label class="font-medium">Select Date:</label>
        <input type="date" id="filterDate" class="border rounded-lg px-3 py-2">
        <button id="applyFilter" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">View</button>
        <button id="todayBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg">Today</button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-2xl p-5"><p class="text-emerald-100">Total OTPs</p><p class="text-white text-3xl font-bold" id="totalOtps">0</p></div>
        <div class="bg-gradient-to-br from-amber-500 to-amber-600 rounded-2xl p-5"><p class="text-amber-100">Total Earnings</p><p class="text-white text-3xl font-bold" id="totalEarnings">$0</p></div>
        <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl p-5"><p class="text-purple-100">Active Users</p><p class="text-white text-3xl font-bold" id="activeUsers">0</p></div>
        <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-5"><p class="text-blue-100">Avg per User</p><p class="text-white text-3xl font-bold" id="avgPerUser">$0</p></div>
    </div>
    
    <div class="bg-white rounded-2xl border overflow-hidden">
        <table class="w-full"><thead class="bg-gray-50"> …
            <th class="px-6 py-3 text-left">User</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-center">Numbers</th><th class="px-6 py-3 text-center">OTPs</th><th class="px-6 py-3 text-center">Earnings</th><th class="px-6 py-3 text-center">Last Activity</th>
        </thead><tbody id="activitiesTable"></tbody>追赶
    </div>
</main>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

const session = JSON.parse(localStorage.getItem('mima_session') || 'null');
if (!session || session.role !== 'admin') window.location.href = '../index.html';
document.getElementById('adminName').innerText = session.username;

function getTodayStr() { return new Date().toISOString().slice(0, 10); }

async function loadActivities() {
    const filterDate = document.getElementById('filterDate').value || getTodayStr();
    
    // Get all users
    const usersRes = await fetch(`${SUPABASE_URL}/rest/v1/users?select=id,username,email`, { headers: { 'apikey': API_KEY } });
    const users = await usersRes.json();
    
    // Get all numbers
    const numsRes = await fetch(`${SUPABASE_URL}/rest/v1/user_numbers?select=*`, { headers: { 'apikey': API_KEY } });
    const numbers = await numsRes.json();
    
    // Get OTPs for selected date
    const otpsRes = await fetch(`${SUPABASE_URL}/rest/v1/otp_logs?select=*,date=eq.${filterDate}`, { headers: { 'apikey': API_KEY } });
    const otps = await otpsRes.json();
    
    let totalOtps = 0, totalEarnings = 0, activeCount = 0;
    const rows = [];
    
    for (const user of users) {
        const userNumbers = numbers.filter(n => n.user_id === user.id);
        const userLast3 = userNumbers.map(n => n.last3);
        const userOtps = otps.filter(o => userLast3.includes(o.phone_last3));
        const otpCount = userOtps.length;
        const earnings = otpCount * 0.005;
        const lastOtp = userOtps.sort((a,b)=>new Date(b.message_time)-new Date(a.message_time))[0];
        
        totalOtps += otpCount;
        totalEarnings += earnings;
        if (otpCount > 0) activeCount++;
        
        rows.push(`<tr class="border-b"><td class="px-6 py-3 font-medium">${escapeHtml(user.username)}Js<td class="px-6 py-3">${escapeHtml(user.email)}Js<td class="px-6 py-3 text-center">${userNumbers.length}Js<td class="px-6 py-3 text-center font-bold text-emerald-600">${otpCount}Js<td class="px-6 py-3 text-center">$${earnings.toFixed(2)}Js<td class="px-6 py-3 text-center text-xs">${lastOtp ? new Date(lastOtp.message_time).toLocaleTimeString() : '—'}Js</tr>`);
    }
    
    document.getElementById('totalOtps').textContent = totalOtps;
    document.getElementById('totalEarnings').textContent = `$${totalEarnings.toFixed(2)}`;
    document.getElementById('activeUsers').textContent = activeCount;
    document.getElementById('avgPerUser').textContent = `$${(activeCount > 0 ? (totalEarnings/activeCount).toFixed(2) : '0.00')}`;
    document.getElementById('activitiesTable').innerHTML = rows.join('');
}

function setToday() { document.getElementById('filterDate').value = getTodayStr(); loadActivities(); }

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]||m)); }
function logout() { localStorage.removeItem('mima_session'); window.location.href = '../index.html'; }

document.getElementById('applyFilter').onclick = loadActivities;
document.getElementById('todayBtn').onclick = setToday;
document.getElementById('filterDate').value = getTodayStr();

document.getElementById('menuBtn').onclick = e => { e.stopPropagation(); document.getElementById('dropdown').classList.toggle('hidden-dropdown'); };
document.addEventListener('click', () => document.getElementById('dropdown').classList.add('hidden-dropdown'));
document.getElementById('logoutBtn').onclick = e => { e.preventDefault(); logout(); };

loadActivities();
</script>
</body>
</html>
