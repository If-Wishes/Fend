<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <style>
        .hidden-dropdown { display: none; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600 hover:text-gray-800"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600 flex items-center justify-center"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium">Admin</p>
                    <p class="text-xs text-gray-500">User Management</p>
                </div>
                <div class="relative">
                    <button id="menuBtn" class="flex items-center gap-2 bg-gray-100 rounded-full px-3 py-2">
                        <i class="fas fa-user-shield"></i><i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                        <a href="dashboard.html" class="block px-4 py-2">Dashboard</a>
                        <a href="users.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">Users</a>
                        <a href="analytics.html" class="block px-4 py-2">Number Allocation</a>
                        <a href="activities.html" class="block px-4 py-2">User Activities</a>
                        <div class="border-t"></div>
                        <a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-between items-center mb-6">
        <div><h1 class="text-2xl font-bold">User Management</h1><p class="text-gray-500">Users stored in Supabase cloud</p></div>
        <button id="createBtn" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl"><i class="fas fa-plus mr-2"></i>New User</button>
    </div>
    <div class="bg-white rounded-2xl border overflow-hidden">
        <table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left">Username</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Created</th><th class="px-6 py-3 text-center">Actions</th></tr></thead><tbody id="usersList"></tbody></table>
    </div>
</main>

<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-white rounded-2xl p-6 w-96"><h3 id="modalTitle" class="text-xl font-bold mb-4">Create User</h3><input type="hidden" id="editId"><input type="text" id="username" placeholder="Username" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="email" id="email" placeholder="Email" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="password" id="password" placeholder="Password" class="w-full border rounded-xl px-4 py-2 mb-3"><div class="flex gap-3"><button id="closeModal" class="px-4 py-2 border rounded-xl">Cancel</button><button id="saveUser" class="px-4 py-2 bg-indigo-600 text-white rounded-xl">Save</button></div></div></div>

<script>
let users = [];

async function loadUsers() {
    users = await getUsers();
    const tbody = document.getElementById('usersList');
    if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8">No users</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `<tr class="border-b"><td class="px-6 py-3">${escapeHtml(u.username)}</td><td class="px-6 py-3">${escapeHtml(u.email)}</td><td class="px-6 py-3 text-xs">${u.created_at?.slice(0,10) || '—'}</td><td class="text-center"><button onclick="deleteUser('${u.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`).join('');
}

async function deleteUser(id) { if (confirm('Delete user?')) { await deleteUser(id); loadUsers(); } }

function openModal() { const m=document.getElementById('modal'); m.classList.remove('hidden'); m.style.display='flex'; document.getElementById('username').value=''; document.getElementById('email').value=''; document.getElementById('password').value=''; }
function closeModal() { const m=document.getElementById('modal'); m.classList.add('hidden'); m.style.display='none'; }
async function saveUser() { const u=document.getElementById('username').value.trim(), e=document.getElementById('email').value.trim(), p=document.getElementById('password').value; if(!u||!e||!p){alert('All fields required');return;} const r=await createUser(u,e,p); if(r){closeModal();loadUsers();alert(`User "${u}" created! Password: ${p}`);} }

function adminLogout() { localStorage.removeItem('mima_admin_session'); window.location.href='../index.html'; }

document.getElementById('menuBtn').onclick=e=>{e.stopPropagation();document.getElementById('dropdown').classList.toggle('hidden-dropdown');};
document.addEventListener('click',()=>document.getElementById('dropdown').classList.add('hidden-dropdown'));
document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();adminLogout();};
document.getElementById('createBtn').onclick=openModal;
document.getElementById('closeModal').onclick=closeModal;
document.getElementById('saveUser').onclick=saveUser;

if(!localStorage.getItem('mima_admin_session')) window.location.href='../index.html';
loadUsers();
</script>
</body>
</html>
