<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <button onclick="adminLogout()" class="text-red-600"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between mb-6">
        <h1 class="text-2xl font-bold">User Management</h1>
        <button id="createBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">+ New User</button>
    </div>
    <div class="bg-white rounded-2xl border">
        <table class="w-full">
            <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left">Username</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Created</th><th class="px-6 py-3 text-center">Actions</th></tr></thead>
            <tbody id="usersList"></tbody>
        </table>
    </div>
</main>

<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center"><div class="bg-white rounded-2xl p-6 w-96"><h3 id="modalTitle" class="text-xl font-bold mb-4">Create User</h3><input type="hidden" id="editId"><input type="text" id="username" placeholder="Username" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="password" id="password" placeholder="Password" class="w-full border rounded-xl px-4 py-2 mb-3"><div class="flex gap-3"><button id="closeModal" class="px-4 py-2 border rounded-xl">Cancel</button><button id="saveUser" class="px-4 py-2 bg-indigo-600 text-white rounded-xl">Save</button></div></div></div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script>
function renderUsers(){const users=getUsers();document.getElementById('usersList').innerHTML=users.map(u=>`<tr class="border-b"><td class="px-6 py-3">${u.username}Js<td class="px-6 py-3">${u.email}Js<td class="text-xs">${u.createdAt||''}Js<td class="text-center"><button onclick="editUser('${u.id}')" class="text-indigo-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteUser('${u.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>Js</tr>`).join('');}
function openModal(edit,user){const modal=document.getElementById('modal');modal.classList.remove('hidden');modal.style.display='flex';if(edit){document.getElementById('modalTitle').innerText='Edit User';document.getElementById('editId').value=user.id;document.getElementById('username').value=user.username;document.getElementById('password').value='';}else{document.getElementById('modalTitle').innerText='Create User';document.getElementById('editId').value='';document.getElementById('username').value='';document.getElementById('password').value='';}}
function closeModal(){const modal=document.getElementById('modal');modal.classList.add('hidden');modal.style.display='none';}
function saveUser(){const username=document.getElementById('username').value.trim();const editId=document.getElementById('editId').value;if(!username){alert('Username required');return;}if(editId){updateUser(editId,username,`${username}@mimapanel.com`);closeModal();renderUsers();}else{const password=document.getElementById('password').value;if(!password){alert('Password required');return;}createUser(username,password);closeModal();renderUsers();alert(`User created! Password: ${password}`);}}
window.editUser=(id)=>{const user=getUsers().find(u=>u.id===id);if(user)openModal(true,user);};
window.deleteUser=(id)=>{if(confirm('Delete user?')){deleteUserById(id);renderUsers();}};
document.addEventListener('DOMContentLoaded',()=>{initData();renderUsers();document.getElementById('createBtn').onclick=()=>openModal(false);document.getElementById('closeModal').onclick=closeModal;document.getElementById('saveUser').onclick=saveUser;});</script>
</body>
</html>
