<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600 hover:text-gray-800"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600 flex items-center justify-center"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <button onclick="logout()" class="text-red-600"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between mb-6">
        <div><h1 class="text-2xl font-bold">User Management</h1><p class="text-gray-500">Users stored in cloud database - accessible from any device</p></div>
        <button id="createBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">+ New User</button>
    </div>
    <div class="bg-white rounded-2xl border overflow-hidden">
        <table class="w-full"><thead class="bg-gray-50"> …
            <th class="px-6 py-3 text-left">Username</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Created</th><th class="px-6 py-3 text-center">Actions</th>
        </thead><tbody id="usersList"></tbody> </table>
    </div>
</main>

<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-96"><h3 id="modalTitle" class="text-xl font-bold mb-4">Create User</h3><input type="hidden" id="editId"><input type="text" id="username" placeholder="Username" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="email" id="email" placeholder="Email" class="w-full border rounded-xl px-4 py-2 mb-3"><input type="password" id="password" placeholder="Password" class="w-full border rounded-xl px-4 py-2 mb-3"><div class="flex gap-3"><button id="closeModal" class="px-4 py-2 border rounded-xl">Cancel</button><button id="saveUser" class="px-4 py-2 bg-indigo-600 text-white rounded-xl">Save</button></div></div>
</div>

<script>
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadUsers() {
    const { data: users, error } = await supabase
        .from('users')
        .select('*')
        .neq('email', 'admin@mimapanel.com')
        .order('created_at', { ascending: false });
    
    if (users) {
        document.getElementById('usersList').innerHTML = users.map(u => `
            <tr class="border-b"><td class="px-6 py-3">${u.username}</td><td class="px-6 py-3">${u.email}</td><td class="px-6 py-3 text-xs">${u.created_at?.slice(0,10) || ''}</td>
            <td class="text-center"><button onclick="deleteUser('${u.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>
        `).join('');
    }
}

async function createUser(username, email, password) {
    const { data, error } = await supabase
        .from('users')
        .insert([{ username, email, password }])
        .select();
    
    if (error) {
        alert('Error: ' + error.message);
        return false;
    }
    return true;
}

async function deleteUser(id) {
    if (confirm('Delete this user?')) {
        await supabase.from('users').delete().eq('id', id);
        loadUsers();
    }
}

function openModal() {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').style.display = 'none';
}

async function saveUser() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!username || !email || !password) {
        alert('All fields required');
        return;
    }
    
    const success = await createUser(username, email, password);
    if (success) {
        closeModal();
        loadUsers();
        alert(`User "${username}" created! Password: ${password}`);
    }
}

function logout() {
    localStorage.removeItem('mima_admin_session');
    window.location.href = '../index.html';
}

document.getElementById('createBtn').onclick = openModal;
document.getElementById('closeModal').onclick = closeModal;
document.getElementById('saveUser').onclick = saveUser;

// Check admin session
if (!localStorage.getItem('mima_admin_session')) {
    window.location.href = '../index.html';
}

loadUsers();
</script>
</body>
</html>
