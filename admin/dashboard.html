<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="ml-2 text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="ml-3 text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <button onclick="logout()" class="text-red-600"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold">Admin Dashboard</h1>
    <p class="text-gray-500 mb-6">Welcome to MIMA Panel Admin</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="users.html" class="bg-white rounded-2xl border p-6 hover:shadow-md">
            <i class="fas fa-users text-2xl text-indigo-500"></i>
            <h3 class="font-semibold mt-2">User Management</h3>
            <p class="text-sm text-gray-500">Create and manage users</p>
        </a>
        <a href="analytics.html" class="bg-white rounded-2xl border p-6 hover:shadow-md">
            <i class="fas fa-phone-alt text-2xl text-emerald-500"></i>
            <h3 class="font-semibold mt-2">Number Allocation</h3>
            <p class="text-sm text-gray-500">Assign numbers to users</p>
        </a>
        <a href="activities.html" class="bg-white rounded-2xl border p-6 hover:shadow-md">
            <i class="fas fa-chart-line text-2xl text-purple-500"></i>
            <h3 class="font-semibold mt-2">User Activities</h3>
            <p class="text-sm text-gray-500">View all user activity</p>
        </a>
    </div>
</main>

<script>
function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}
// Check if admin is logged in
const session = localStorage.getItem('mima_session');
if (!session || JSON.parse(session).role !== 'admin') {
    window.location.href = '../index.html';
}
</script>
</body>
</html>
