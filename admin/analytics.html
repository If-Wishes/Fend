<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Number Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>.hidden-dropdown{display:none;}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right"><p class="text-sm font-medium" id="adminName">Admin</p><p class="text-xs text-gray-500">Number Allocation</p></div>
                <div class="relative"><button id="menuBtn" class="bg-gray-100 rounded-full px-3 py-2"><i class="fas fa-user-shield"></i><i class="fas fa-chevron-down text-xs"></i></button>
                <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                    <a href="dashboard.html" class="block px-4 py-2">Dashboard</a><a href="users.html" class="block px-4 py-2">Users</a>
                    <a href="analytics.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">Number Allocation</a><a href="activities.html" class="block px-4 py-2">User Activities</a>
                    <div class="border-t"></div><a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                </div></div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold">Number Allocation</h1>
    <p class="text-gray-500 mb-6">Assign phone numbers to users by country</p>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl border p-6">
            <h2 class="font-semibold mb-4">➕ Add Numbers</h2>
            <select id="userSelect" class="w-full border rounded-xl px-4 py-2 mb-3"><option value="">-- Select User --</option></select>
            <select id="countrySelect" class="w-full border rounded-xl px-4 py-2 mb-3">
                <option value="">-- Country --</option>
                <option value="Jordan">🇯🇴 Jordan</option><option value="Tajikistan">🇹🇯 Tajikistan</option>
                <option value="Nigeria">🇳🇬 Nigeria</option><option value="Myanmar">🇲🇲 Myanmar</option>
                <option value="Hungary">🇭🇺 Hungary</option><option value="Slovenia">🇸🇮 Slovenia</option>
                <option value="Venezuela">🇻🇪 Venezuela</option><option value="Uzbekistan">🇺🇿 Uzbekistan</option>
            </select>
            <textarea id="numbersInput" rows="4" class="w-full border rounded-xl px-4 py-2 mb-3 font-mono" placeholder="Enter numbers (one per line)&#10;Example:&#10;+998901234567&#10;+998902345678"></textarea>
            <button id="addBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl w-full">Add Numbers</button>
        </div>
        <div class="bg-white rounded-2xl border p-6">
            <h2 class="font-semibold mb-4">📋 Allocated Numbers</h2>
            <select id="filterSelect" class="w-full border rounded-xl px-4 py-2 mb-4"><option value="">-- All Users --</option></select>
            <div id="allocations" class="max-h-96 overflow-y-auto"></div>
        </div>
    </div>
</main>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

const session = JSON.parse(localStorage.getItem('mima_session') || 'null');
if (!session || session.role !== 'admin') window.location.href = '../index.html';
document.getElementById('adminName').innerText = session.username;

let users = [];

function getLast3(number) { return number.replace(/\D/g, '').slice(-3); }

async function loadUsers() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=id,username`, { headers: { 'apikey': API_KEY } });
    users = await res.json();
    const userSel = document.getElementById('userSelect');
    userSel.innerHTML = '<option value="">-- Select User --</option>' + users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
    const filterSel = document.getElementById('filterSelect');
    filterSel.innerHTML = '<option value="">-- All Users --</option>' + users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
    filterSel.onchange = () => renderAllocations();
}

async function renderAllocations() {
    const filter = document.getElementById('filterSelect').value;
    let url = `${SUPABASE_URL}/rest/v1/user_numbers?select=*,users(username)&order=allocated_at.desc`;
    if (filter) url = `${SUPABASE_URL}/rest/v1/user_numbers?select=*,users(username)&user_id=eq.${filter}&order=allocated_at.desc`;
    const res = await fetch(url, { headers: { 'apikey': API_KEY } });
    const nums = await res.json();
    const container = document.getElementById('allocations');
    if (nums.length === 0) { container.innerHTML = '<div class="text-center py-8 text-gray-400">No numbers allocated</div>'; return; }
    
    const grouped = {};
    for (const n of nums) {
        const key = n.user_id + '_' + n.country;
        if (!grouped[key]) grouped[key] = { userId: n.user_id, userName: n.users?.username || 'Unknown', country: n.country, numbers: [] };
        grouped[key].numbers.push(n);
    }
    
    let html = '';
    for (const key in grouped) {
        const g = grouped[key];
        html += `<div class="border rounded-xl mb-3"><div class="bg-gray-50 px-4 py-2 flex justify-between"><span><strong>${escapeHtml(g.userName)}</strong> - ${escapeHtml(g.country)}</span><button onclick="deleteCountry('${g.userId}','${g.country}')" class="text-red-500 text-sm">Delete All</button></div><div class="flex flex-wrap gap-2 p-3">`;
        for (const num of g.numbers) {
            html += `<span class="bg-gray-100 px-3 py-1 rounded-full text-sm flex items-center gap-1"><span class="font-mono">${escapeHtml(num.number)}</span><button onclick="deleteNumber('${num.id}')" class="text-red-400 hover:text-red-600">&times;</button></span>`;
        }
        html += `</div></div>`;
    }
    container.innerHTML = html;
}

async function addNumbers() {
    const uid = document.getElementById('userSelect').value;
    const country = document.getElementById('countrySelect').value;
    const input = document.getElementById('numbersInput').value;
    if (!uid || !country || !input) { alert('Fill all fields'); return; }
    let nums = input.split(/[,\n]/).map(n => n.trim()).filter(n => n);
    if (nums.length === 0) { alert('No valid numbers'); return; }
    
    for (const num of nums) {
        await fetch(`${SUPABASE_URL}/rest/v1/user_numbers`, {
            method: 'POST', headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: uid, number: num, last3: getLast3(num), country: country })
        });
    }
    document.getElementById('numbersInput').value = '';
    alert(`Added ${nums.length} numbers`);
    renderAllocations();
}

window.deleteCountry = async (uid, country) => { if(confirm('Delete all numbers?')) { await fetch(`${SUPABASE_URL}/rest/v1/user_numbers?user_id=eq.${uid}&country=eq.${country}`, { method: 'DELETE', headers: { 'apikey': API_KEY } }); renderAllocations(); } };
window.deleteNumber = async (id) => { if(confirm('Delete this number?')) { await fetch(`${SUPABASE_URL}/rest/v1/user_numbers?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': API_KEY } }); renderAllocations(); } };

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]||m)); }
function logout() { localStorage.removeItem('mima_session'); window.location.href = '../index.html'; }

document.getElementById('menuBtn').onclick = e => { e.stopPropagation(); document.getElementById('dropdown').classList.toggle('hidden-dropdown'); };
document.addEventListener('click', () => document.getElementById('dropdown').classList.add('hidden-dropdown'));
document.getElementById('logoutBtn').onclick = e => { e.preventDefault(); logout(); };
document.getElementById('addBtn').onclick = addNumbers;

loadUsers();
renderAllocations();
</script>
</body>
</html>
