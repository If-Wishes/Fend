<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Number Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .hidden-dropdown { display: none; }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .used-number {
            background-color: #fee2e2 !important;
            border-left: 3px solid #dc2626 !important;
            text-decoration: line-through;
            opacity: 0.8;
        }
        .used-number:hover {
            background-color: #fecaca !important;
        }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right"><p class="text-sm font-medium" id="adminName">Admin</p><p class="text-xs text-gray-500">Number Allocation</p></div>
                <div class="relative">
                    <button id="menuBtn" class="bg-gray-100 rounded-full px-3 py-2"><i class="fas fa-user-shield"></i><i class="fas fa-chevron-down text-xs"></i></button>
                    <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                        <a href="dashboard.html" class="block px-4 py-2">Dashboard</a>
                        <a href="users.html" class="block px-4 py-2">Users</a>
                        <a href="analytics.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">Number Allocation</a>
                        <a href="activities.html" class="block px-4 py-2">User Activities</a>
                        <div class="border-t"></div>
                        <a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold">Number Allocation</h1>
    <p class="text-gray-500 mb-6">Manage numbers - <span class="text-red-600">Red highlighted numbers</span> have received OTPs</p>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Add Numbers Form -->
        <div class="bg-white rounded-2xl border p-6">
            <h2 class="font-semibold mb-4">➕ Add Numbers</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select User *</label>
                <select id="userSelect" class="w-full border rounded-xl px-4 py-2 bg-gray-50">
                    <option value="">-- Select User --</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Country *</label>
                <select id="countrySelect" class="w-full border rounded-xl px-4 py-2 bg-gray-50">
                    <option value="">-- Select Country --</option>
                    <option value="Jordan">🇯🇴 Jordan</option>
                    <option value="Tajikistan">🇹🇯 Tajikistan</option>
                    <option value="Nigeria">🇳🇬 Nigeria</option>
                    <option value="Myanmar">🇲🇲 Myanmar</option>
                    <option value="Hungary">🇭🇺 Hungary</option>
                    <option value="Slovenia">🇸🇮 Slovenia</option>
                    <option value="Venezuela">🇻🇪 Venezuela</option>
                    <option value="Bolivia">🇧🇴 Bolivia</option>
                    <option value="Uzbekistan">🇺🇿 Uzbekistan</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Numbers *</label>
                <textarea id="numbersInput" rows="5" class="w-full border rounded-xl px-4 py-2 font-mono text-sm" 
                    placeholder="Enter phone numbers (one per line or comma separated)
Example:
+2348123456789
+2348023456789
+998901234567"></textarea>
                <p class="text-xs text-gray-400 mt-1"></p>
            </div>
            
            <button id="addBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl transition">
                <i class="fas fa-plus mr-2"></i>Allocate Numbers
            </button>
            
            <div id="messageBox" class="mt-4 text-sm text-center hidden"></div>
        </div>
        
        <!-- Allocated Numbers List -->
        <div class="bg-white rounded-2xl border p-6">
            <h2 class="font-semibold mb-4">📋 Allocated Numbers</h2>
            <select id="filterSelect" class="w-full border rounded-xl px-4 py-2 mb-4 bg-gray-50">
            </select>
            <div id="allocationsList" class="max-h-96 overflow-y-auto space-y-3">
                <div class="text-center py-8 text-gray-400">Loading...</div>
            </div>
        </div>
    </div>
</main>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

const session = JSON.parse(localStorage.getItem('mima_session') || 'null');
if (!session || session.role !== 'admin') window.location.href = '../index.html';
document.getElementById('adminName').innerText = session.username;

let usersList = [];
let usedNumbersSet = new Set(); // Store last3 digits that have received OTPs

// Helper function to extract last 3 digits
function getLast3Digits(number) {
    let cleaned = number.replace(/[^0-9]/g, '');
    return cleaned.slice(-3);
}

// Escape HTML
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

// Get country flag
function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿', 'Bolivia': '🇧🇴'
    };
    return flags[country] || '🌍';
}

// Fetch all OTPs to know which numbers are used
async function fetchUsedNumbers() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/otp_logs?select=phone_last3`, {
            headers: { 'apikey': API_KEY }
        });
        const otps = await res.json();
        usedNumbersSet.clear();
        otps.forEach(otp => {
            if (otp.phone_last3) usedNumbersSet.add(otp.phone_last3);
        });
        console.log(`Found ${usedNumbersSet.size} used numbers (last3):`, Array.from(usedNumbersSet));
    } catch (err) {
        console.error("Error fetching OTPs:", err);
    }
}

// Load users for dropdowns
async function loadUsers() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=id,username`, {
        headers: { 'apikey': API_KEY }
    });
    usersList = await res.json();
    
    const userSelect = document.getElementById('userSelect');
    userSelect.innerHTML = '<option value="">-- Select User --</option>' + 
        usersList.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
    
    const filterSelect = document.getElementById('filterSelect');
    filterSelect.innerHTML = '<option value="">-- All Users --</option>' + 
        usersList.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
    filterSelect.onchange = loadAllocatedNumbers;
}

// Load and display allocated numbers with RED HIGHLIGHT for used ones
async function loadAllocatedNumbers() {
    const filterUserId = document.getElementById('filterSelect').value;
    let url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=*,users(username)&order=allocated_at.desc`;
    if (filterUserId) {
        url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=*,users(username)&user_id=eq.${filterUserId}&order=allocated_at.desc`;
    }
    
    const res = await fetch(url, { headers: { 'apikey': API_KEY } });
    const allocations = await res.json();
    const container = document.getElementById('allocationsList');
    
    if (allocations.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400">No numbers allocated yet</div>';
        return;
    }
    
    // Group by user and country
    const grouped = {};
    for (const item of allocations) {
        const key = `${item.user_id}_${item.country}`;
        if (!grouped[key]) {
            grouped[key] = {
                userId: item.user_id,
                userName: item.users?.username || 'Unknown',
                country: item.country,
                numbers: []
            };
        }
        grouped[key].numbers.push(item);
    }
    
    let html = '';
    for (const key in grouped) {
        const g = grouped[key];
        
        // Count used numbers in this group
        const usedCount = g.numbers.filter(num => usedNumbersSet.has(num.last3)).length;
        const totalCount = g.numbers.length;
        
        html += `
            <div class="border rounded-xl overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 flex justify-between items-center">
                    <div>
                        <span class="font-semibold">${escapeHtml(g.userName)}</span>
                        <span class="ml-2 text-sm text-gray-500">${getCountryFlag(g.country)} ${escapeHtml(g.country)}</span>
                        ${usedCount > 0 ? `<span class="ml-2 text-xs text-red-600">(${usedCount}/${totalCount} used)</span>` : `<span class="ml-2 text-xs text-green-600">(${totalCount} active)</span>`}
                    </div>
                    <button onclick="deleteCountryNumbers('${g.userId}', '${g.country}')" class="text-red-500 text-sm hover:text-red-700">
                        <i class="fas fa-trash-alt mr-1"></i>Delete All
                    </button>
                </div>
                <div class="p-3 flex flex-wrap gap-2">
                    ${g.numbers.map(num => {
                        const isUsed = usedNumbersSet.has(num.last3);
                        const usedClass = isUsed ? 'used-number' : '';
                        const usedIcon = isUsed ? '<i class="fas fa-check-circle text-red-500 mr-1 text-xs"></i>' : '<i class="fas fa-circle text-green-500 mr-1 text-xs"></i>';
                        const title = isUsed ? 'This number has received an OTP' : 'Active number - no OTP received yet';
                        
                        return `
                            <div class="bg-gray-100 rounded-lg px-3 py-1.5 flex items-center gap-2 ${usedClass}" title="${title}">
                                ${usedIcon}
                                <span class="font-mono text-sm">${escapeHtml(num.number)}</span>
                                <span class="text-xs text-gray-400">(last3: ${num.last3})</span>
                                <button onclick="deleteSingleNumber('${num.id}')" class="text-red-400 hover:text-red-600">
                                    <i class="fas fa-times-circle"></i>
                                </button>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="bg-gray-50 px-4 py-1 text-xs text-gray-400">
                    Total: ${totalCount} numbers | Used: ${usedCount} | Active: ${totalCount - usedCount}
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

// Add numbers to user
async function addNumbers() {
    const userId = document.getElementById('userSelect').value;
    const country = document.getElementById('countrySelect').value;
    const numbersInput = document.getElementById('numbersInput').value;
    const messageBox = document.getElementById('messageBox');
    
    if (!userId) {
        showMessage('Please select a user', 'error');
        return;
    }
    if (!country) {
        showMessage('Please select a country', 'error');
        return;
    }
    if (!numbersInput.trim()) {
        showMessage('Please enter phone numbers', 'error');
        return;
    }
    
    let numbers = numbersInput.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
    if (numbers.length === 0) {
        showMessage('No valid numbers found', 'error');
        return;
    }
    
    showMessage('Adding numbers...', 'info');
    
    let successCount = 0;
    let errorCount = 0;
    
    for (const number of numbers) {
        const last3 = getLast3Digits(number);
        if (last3.length < 3) {
            errorCount++;
            continue;
        }
        
        const res = await fetch(`${SUPABASE_URL}/rest/v1/allocated_numbers`, {
            method: 'POST',
            headers: { 
                'apikey': API_KEY, 
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                user_id: userId,
                number: number,
                last3: last3,
                country: country
            })
        });
        
        if (res.ok) {
            successCount++;
        } else {
            errorCount++;
        }
    }
    
    if (successCount > 0) {
        showMessage(`✅ Successfully added ${successCount} numbers!`, 'success');
        document.getElementById('numbersInput').value = '';
        await loadAllocatedNumbers();
    } else {
        showMessage(`❌ Failed to add numbers. Check that numbers have at least 3 digits.`, 'error');
    }
    
    setTimeout(() => {
        messageBox.classList.add('hidden');
    }, 3000);
}

// Delete all numbers for a user in a country
async function deleteCountryNumbers(userId, country) {
    if (!confirm(`Delete all numbers for this user in ${country}?`)) return;
    
    const res = await fetch(`${SUPABASE_URL}/rest/v1/allocated_numbers?user_id=eq.${userId}&country=eq.${country}`, {
        method: 'DELETE',
        headers: { 'apikey': API_KEY }
    });
    
    if (res.ok) {
        await loadAllocatedNumbers();
        showMessage('Numbers deleted successfully', 'success');
        setTimeout(() => {
            document.getElementById('messageBox').classList.add('hidden');
        }, 2000);
    }
}

// Delete a single number
async function deleteSingleNumber(numberId) {
    if (!confirm('Delete this number?')) return;
    
    const res = await fetch(`${SUPABASE_URL}/rest/v1/allocated_numbers?id=eq.${numberId}`, {
        method: 'DELETE',
        headers: { 'apikey': API_KEY }
    });
    
    if (res.ok) {
        await loadAllocatedNumbers();
    }
}

// Show message
function showMessage(msg, type) {
    const messageBox = document.getElementById('messageBox');
    messageBox.textContent = msg;
    messageBox.className = `mt-4 text-sm text-center p-2 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : type === 'error' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`;
    messageBox.classList.remove('hidden');
}

// Logout
function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}

// Make functions global for onclick
window.deleteCountryNumbers = deleteCountryNumbers;
window.deleteSingleNumber = deleteSingleNumber;

// Event listeners
document.getElementById('menuBtn').onclick = e => { e.stopPropagation(); document.getElementById('dropdown').classList.toggle('hidden-dropdown'); };
document.addEventListener('click', () => document.getElementById('dropdown').classList.add('hidden-dropdown'));
document.getElementById('logoutBtn').onclick = e => { e.preventDefault(); logout(); };
document.getElementById('addBtn').onclick = addNumbers;

// Initialize
async function init() {
    await fetchUsedNumbers();
    await loadUsers();
    await loadAllocatedNumbers();
}

init();
</script>
</body>
</html>
