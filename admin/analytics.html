<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Number Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .hidden-dropdown { display: none; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-600 hover:text-gray-800"><i class="fas fa-arrow-left"></i></a>
                <div class="h-8 w-8 rounded-lg bg-indigo-600 flex items-center justify-center"><i class="fas fa-chart-line text-white"></i></div>
                <span class="text-xl font-bold">MIMA<span class="text-indigo-600">Panel</span></span>
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">Admin</span>
            </div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium">Admin</p>
                    <p class="text-xs text-gray-500">Number Allocation</p>
                </div>
                <div class="relative">
                    <button id="menuBtn" class="flex items-center gap-2 bg-gray-100 rounded-full px-3 py-2">
                        <i class="fas fa-user-shield"></i>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown z-50">
                        <a href="dashboard.html" class="block px-4 py-2">Dashboard</a>
                        <a href="users.html" class="block px-4 py-2">Users</a>
                        <a href="analytics.html" class="block px-4 py-2 bg-indigo-50 text-indigo-600">Number Allocation</a>
                        <a href="activities.html" class="block px-4 py-2">User Activities</a>
                        <div class="border-t"></div>
                        <a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold text-gray-900">Number Allocation</h1>
    <p class="text-gray-500 mb-6">Assign phone numbers to users by country</p>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">➕ Add Numbers</h2>
            <select id="userSelect" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 mb-3 bg-gray-50">
                <option value="">-- Select User --</option>
            </select>
            <select id="countrySelect" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 mb-3 bg-gray-50">
                <option value="">-- Country --</option>
                <option value="Jordan">🇯🇴 Jordan</option>
                <option value="Tajikistan">🇹🇯 Tajikistan</option>
                <option value="Nigeria">🇳🇬 Nigeria</option>
                <option value="Myanmar">🇲🇲 Myanmar</option>
                <option value="Hungary">🇭🇺 Hungary</option>
                <option value="Slovenia">🇸🇮 Slovenia</option>
                <option value="Venezuela">🇻🇪 Venezuela</option>
                <option value="Uzbekistan">🇺🇿 Uzbekistan</option>
            </select>
            <textarea id="numbersInput" rows="4" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 mb-3 font-mono text-sm" placeholder="Enter numbers (one per line or comma separated)&#10;Example:&#10;+998901234567&#10;+998902345678"></textarea>
            <button id="addBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl transition">Add Numbers</button>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">📋 Allocated Numbers</h2>
            <select id="filterSelect" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 mb-4 bg-gray-50">
                <option value="">-- All Users --</option>
            </select>
            <div id="allocations" class="max-h-96 overflow-y-auto"></div>
        </div>
    </div>
</main>

<script src="../js/users.js"></script>
<script>
// Get users from USERS_DATABASE (from users.js)
function getUsers() {
    return USERS_DATABASE || [];
}

let userNumbers = [];

function loadData() {
    userNumbers = JSON.parse(localStorage.getItem('mima_analytics_numbers') || '[]');
    populateSelects();
    renderAllocations();
}

function populateSelects() {
    const users = getUsers();
    const userSel = document.getElementById('userSelect');
    if (userSel) {
        userSel.innerHTML = '<option value="">-- Select User --</option>' + 
            users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
    }
    const filterSel = document.getElementById('filterSelect');
    if (filterSel) {
        filterSel.innerHTML = '<option value="">-- All Users --</option>' + 
            users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}</option>`).join('');
        filterSel.onchange = () => renderAllocations();
    }
}

function renderAllocations() {
    const filter = document.getElementById('filterSelect').value;
    let filtered = userNumbers;
    if (filter) {
        filtered = userNumbers.filter(n => n.userId === filter);
    }
    const container = document.getElementById('allocations');
    if (!container) return;
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400">No numbers allocated</div>';
        return;
    }
    
    const users = getUsers();
    let html = '';
    for (let i = 0; i < filtered.length; i++) {
        const item = filtered[i];
        const user = users.find(u => u.id === item.userId);
        const userName = user ? user.username : 'Unknown User';
        html += `<div class="border rounded-xl mb-3 overflow-hidden">
            <div class="bg-gray-50 px-4 py-2 flex justify-between items-center">
                <span class="font-medium">${escapeHtml(userName)} - ${escapeHtml(item.country)}</span>
                <button onclick="deleteEntry('${item.userId}', '${item.country}')" class="text-red-500 text-sm hover:text-red-700">Delete All</button>
            </div>
            <div class="flex flex-wrap gap-2 p-3">`;
        for (let j = 0; j < item.numbers.length; j++) {
            const num = item.numbers[j];
            html += `<span class="bg-gray-100 px-3 py-1 rounded-full text-sm flex items-center gap-1">
                <span class="font-mono">${escapeHtml(num)}</span>
                <button onclick="deleteNumber('${item.userId}', '${item.country}', '${escapeHtml(num)}')" class="text-red-400 hover:text-red-600">&times;</button>
            </span>`;
        }
        html += `</div></div>`;
    }
    container.innerHTML = html;
}

function addNumbers() {
    const userId = document.getElementById('userSelect').value;
    const country = document.getElementById('countrySelect').value;
    const numbersInput = document.getElementById('numbersInput').value;
    
    if (!userId) { alert('Select a user'); return; }
    if (!country) { alert('Select a country'); return; }
    if (!numbersInput.trim()) { alert('Enter numbers'); return; }
    
    let numbers = numbersInput.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
    if (numbers.length === 0) { alert('No valid numbers'); return; }
    
    const existing = userNumbers.find(n => n.userId === userId && n.country === country);
    if (existing) {
        const newNumbers = numbers.filter(n => !existing.numbers.includes(n));
        if (newNumbers.length > 0) {
            existing.numbers.push(...newNumbers);
        } else {
            alert('All numbers already exist for this user in ' + country);
            return;
        }
    } else {
        userNumbers.push({
            userId: userId,
            country: country,
            numbers: numbers,
            addedAt: new Date().toISOString()
        });
    }
    
    localStorage.setItem('mima_analytics_numbers', JSON.stringify(userNumbers));
    document.getElementById('numbersInput').value = '';
    alert(`✅ Added ${numbers.length} numbers for user in ${country}`);
    renderAllocations();
}

function deleteEntry(userId, country) {
    if (confirm('Delete all numbers for this user in ' + country + '?')) {
        userNumbers = userNumbers.filter(n => !(n.userId === userId && n.country === country));
        localStorage.setItem('mima_analytics_numbers', JSON.stringify(userNumbers));
        renderAllocations();
    }
}

function deleteNumber(userId, country, num) {
    const entry = userNumbers.find(n => n.userId === userId && n.country === country);
    if (entry) {
        entry.numbers = entry.numbers.filter(n => n !== num);
        if (entry.numbers.length === 0) {
            userNumbers = userNumbers.filter(n => !(n.userId === userId && n.country === country));
        }
        localStorage.setItem('mima_analytics_numbers', JSON.stringify(userNumbers));
        renderAllocations();
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function adminLogout() {
    localStorage.removeItem('mima_admin_session');
    window.location.href = '../index.html';
}

// Dropdown menu
const menuBtn = document.getElementById('menuBtn');
const dropdown = document.getElementById('dropdown');
if (menuBtn) {
    menuBtn.onclick = (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('hidden-dropdown');
    };
    document.addEventListener('click', () => {
        dropdown.classList.add('hidden-dropdown');
    });
}

document.getElementById('logoutBtn').onclick = (e) => {
    e.preventDefault();
    adminLogout();
};

// Check admin session
if (!localStorage.getItem('mima_admin_session')) {
    window.location.href = '../index.html';
}

// Initialize
loadData();
document.getElementById('addBtn').onclick = addNumbers;
</script>
</body>
</html>
