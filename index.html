<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .login-container { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .role-card { transition: all 0.3s ease; cursor: pointer; }
        .role-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2); }
        .role-card.active { border-color: #4f46e5; background: #eef2ff; }
        .hidden-panel { display: none; }
        .loading { display: none; text-align: center; padding: 10px; }
        .loading.active { display: block; }
    </style>
</head>
<body class="login-container min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
    <div class="text-center mb-8">
        <div class="h-14 w-14 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg">
            <i class="fas fa-chart-line text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">MIMA<span class="text-indigo-600">Panel</span></h1>
        <p class="text-gray-500 text-sm mt-1">Access your dashboard</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div id="adminRoleCard" class="role-card border-2 border-gray-200 rounded-xl p-4 text-center hover:border-indigo-400">
            <i class="fas fa-shield-alt text-3xl text-gray-400"></i>
            <p class="font-semibold mt-2 text-gray-700">Admin</p>
            <p class="text-xs text-gray-400">System management</p>
        </div>
        <div id="userRoleCard" class="role-card border-2 border-gray-200 rounded-xl p-4 text-center hover:border-emerald-400">
            <i class="fas fa-user-circle text-3xl text-gray-400"></i>
            <p class="font-semibold mt-2 text-gray-700">User</p>
            <p class="text-xs text-gray-400">Personal dashboard</p>
        </div>
    </div>

    <div id="adminLoginForm" class="login-panel">
        <div class="loading" id="adminLoading"><i class="fas fa-spinner fa-spin"></i> Logging in...</div>
        <form id="adminLogin">
            <div class="mb-4"><input type="text" id="adminUsername" placeholder="Username" class="w-full border rounded-xl px-4 py-3"></div>
            <div class="mb-6"><input type="password" id="adminPassword" placeholder="Password" class="w-full border rounded-xl px-4 py-3"></div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl">Login as Admin</button>
        </form>
    </div>

    <div id="userLoginForm" class="login-panel hidden-panel">
        <div class="loading" id="userLoading"><i class="fas fa-spinner fa-spin"></i> Logging in...</div>
        <form id="userLogin">
            <div class="mb-4"><input type="text" id="userUsername" placeholder="Username" class="w-full border rounded-xl px-4 py-3"></div>
            <div class="mb-6"><input type="password" id="userPassword" placeholder="Password" class="w-full border rounded-xl px-4 py-3"></div>
            <button type="submit" class="w-full bg-emerald-500 text-white py-3 rounded-xl">Login as User</button>
        </form>
    </div>

    <div class="mt-6 pt-4 border-t text-center text-xs text-gray-400">
        All accounts stored in Supabase cloud
    </div>
</div>

<script>
// Supabase Configuration
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ LOGIN FUNCTION (Admin & User both from Supabase) ============
async function login(username, password, role) {
    try {
        // Query users table
        const { data, error } = await supabase
            .from('users')
            .select('id, username, email, role')
            .eq('username', username)
            .eq('password', password)
            .single();
        
        if (data) {
            // Check if role matches
            if (data.role !== role) {
                return { success: false, message: `This account is not a ${role}` };
            }
            
            // Store session
            const session = {
                userId: data.id,
                username: data.username,
                email: data.email,
                role: data.role,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('mima_session', JSON.stringify(session));
            return { success: true, session: session };
        }
        
        // Try by email
        const { data: emailData, error: emailError } = await supabase
            .from('users')
            .select('id, username, email, role')
            .eq('email', username)
            .eq('password', password)
            .single();
        
        if (emailData) {
            if (emailData.role !== role) {
                return { success: false, message: `This account is not a ${role}` };
            }
            
            const session = {
                userId: emailData.id,
                username: emailData.username,
                email: emailData.email,
                role: emailData.role,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('mima_session', JSON.stringify(session));
            return { success: true, session: session };
        }
        
        return { success: false, message: 'Invalid credentials' };
    } catch (error) {
        console.error('Login error:', error);
        return { success: false, message: 'Login failed' };
    }
}

// ============ ROLE SELECTION ============
document.getElementById('adminRoleCard').onclick = () => {
    document.getElementById('adminRoleCard').classList.add('active');
    document.getElementById('userRoleCard').classList.remove('active');
    document.getElementById('adminLoginForm').classList.remove('hidden-panel');
    document.getElementById('userLoginForm').classList.add('hidden-panel');
};
document.getElementById('userRoleCard').onclick = () => {
    document.getElementById('userRoleCard').classList.add('active');
    document.getElementById('adminRoleCard').classList.remove('active');
    document.getElementById('userLoginForm').classList.remove('hidden-panel');
    document.getElementById('adminLoginForm').classList.add('hidden-panel');
};

// ============ ADMIN LOGIN HANDLER ============
document.getElementById('adminLogin').onsubmit = async (e) => {
    e.preventDefault();
    const loading = document.getElementById('adminLoading');
    const form = document.getElementById('adminLogin');
    loading.classList.add('active');
    form.style.opacity = '0.5';
    
    const username = document.getElementById('adminUsername').value;
    const password = document.getElementById('adminPassword').value;
    const result = await login(username, password, 'admin');
    
    loading.classList.remove('active');
    form.style.opacity = '1';
    
    if (result.success) {
        window.location.href = 'admin/dashboard.html';
    } else {
        alert(result.message || 'Invalid admin credentials');
    }
};

// ============ USER LOGIN HANDLER ============
document.getElementById('userLogin').onsubmit = async (e) => {
    e.preventDefault();
    const loading = document.getElementById('userLoading');
    const form = document.getElementById('userLogin');
    loading.classList.add('active');
    form.style.opacity = '0.5';
    
    const username = document.getElementById('userUsername').value;
    const password = document.getElementById('userPassword').value;
    const result = await login(username, password, 'user');
    
    loading.classList.remove('active');
    form.style.opacity = '1';
    
    if (result.success) {
        window.location.href = 'user/dashboard.html';
    } else {
        alert(result.message || 'Invalid user credentials');
    }
};

// ============ CHECK EXISTING SESSION ============
const existingSession = localStorage.getItem('mima_session');
if (existingSession) {
    try {
        const session = JSON.parse(existingSession);
        if (session.role === 'admin') {
            window.location.href = 'admin/dashboard.html';
        } else if (session.role === 'user') {
            window.location.href = 'user/dashboard.html';
        }
    } catch(e) {}
}
</script>
</body>
</html>
