<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPanel | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex h-16 w-16 rounded-2xl bg-white/20 backdrop-blur items-center justify-center mb-4">
                <i class="fas fa-chart-line text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">Nexus<span class="text-emerald-300">Panel</span></h1>
            <p class="text-white/70 mt-2">Access your dashboard with User ID</p>
        </div>

        <!-- Main Card -->
        <div class="glass-card shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-emerald-500 to-teal-500 px-6 py-4">
                <h2 class="text-white font-semibold text-lg"><i class="fas fa-user-circle mr-2"></i>User Profile</h2>
            </div>
            
            <div class="p-6">
                <!-- User ID Input Section -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-id-card mr-1 text-emerald-600"></i>Enter Your User ID
                    </label>
                    <div class="flex gap-2">
                        <input type="text" id="userIdInput" placeholder="e.g., 3b6de643-3b66-4090-ad42-1ae3615f97ba" 
                               class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                        <button id="loadProfileBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl transition">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">
                        <i class="fas fa-info-circle"></i> Enter your Supabase User ID to load profile
                    </p>
                </div>

                <!-- Profile Display -->
                <div id="profileDisplay" class="hidden">
                    <div class="border-t border-gray-200 pt-4">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center">
                                <i class="fas fa-user text-white text-3xl"></i>
                            </div>
                            <div>
                                <h3 id="displayUsername" class="text-xl font-bold text-gray-800">Loading...</h3>
                                <p id="displayEmail" class="text-gray-500 text-sm">Loading email...</p>
                                <p class="text-xs text-emerald-600 mt-1"><i class="fas fa-check-circle"></i> Active session</p>
                            </div>
                        </div>

                        <!-- User Info Details -->
                        <div class="bg-gray-50 rounded-xl p-4 mb-6">
                            <div class="space-y-3">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-600 text-sm">User ID:</span>
                                    <span id="displayUserId" class="font-mono text-xs bg-white px-2 py-1 rounded text-gray-700"></span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-600 text-sm">Role:</span>
                                    <span id="displayRole" class="text-sm font-medium text-emerald-600"></span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-600 text-sm">Status:</span>
                                    <span class="text-sm text-green-600"><i class="fas fa-circle text-[8px] mr-1"></i> Active</span>
                                </div>
                            </div>
                        </div>

                        <!-- Copy ID Button -->
                        <button id="copyUserIdBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl transition mb-4">
                            <i class="fas fa-copy mr-2"></i>Copy User ID
                        </button>

                        <!-- Navigation Buttons -->
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="navigateTo('today_stat')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-3 rounded-xl transition">
                                <i class="fas fa-calendar-day mr-2"></i>Today's Stat
                            </button>
                            <button onclick="navigateTo('total_otp')" class="bg-amber-50 hover:bg-amber-100 text-amber-700 py-3 rounded-xl transition">
                                <i class="fas fa-dollar-sign mr-2"></i>Total OTP
                            </button>
                            <button onclick="navigateTo('past_records')" class="bg-purple-50 hover:bg-purple-100 text-purple-700 py-3 rounded-xl transition">
                                <i class="fas fa-history mr-2"></i>Past Records
                            </button>
                            <button onclick="logout()" class="bg-red-50 hover:bg-red-100 text-red-600 py-3 rounded-xl transition">
                                <i class="fas fa-sign-out-alt mr-2"></i>Logout
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="hidden text-center py-8">
                    <div class="inline-block w-8 h-8 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-gray-500 mt-2">Loading profile...</p>
                </div>

                <!-- Error State -->
                <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-2xl mb-2"></i>
                    <p id="errorMessage" class="text-red-600 text-sm">User not found</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-6 text-white/60 text-xs">
            <i class="fas fa-shield-alt"></i> Secure access via Supabase
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
        const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

        async function fetchUserById(userId) {
            try {
                const url = `${SUPABASE_URL}/rest/v1/users?select=id,username,email,role&id=eq.${encodeURIComponent(userId)}`;
                const response = await fetch(url, {
                    headers: { 'apikey': SUPABASE_API_KEY }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data && data.length > 0) return data[0];
                return null;
            } catch (err) {
                console.error("Fetch user error:", err);
                return null;
            }
        }

        function setUserSession(userId, userData) {
            sessionStorage.setItem('nexus_user_id', userId);
            sessionStorage.setItem('nexus_user_data', JSON.stringify(userData));
        }

        function clearUserSession() {
            sessionStorage.removeItem('nexus_user_id');
            sessionStorage.removeItem('nexus_user_data');
        }

        function getCurrentUserId() {
            return sessionStorage.getItem('nexus_user_id');
        }

        async function loadProfile(userId) {
            const profileDisplay = document.getElementById('profileDisplay');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const errorMessage = document.getElementById('errorMessage');

            // Show loading
            profileDisplay.classList.add('hidden');
            errorState.classList.add('hidden');
            loadingState.classList.remove('hidden');

            const user = await fetchUserById(userId);
            
            loadingState.classList.add('hidden');

            if (!user) {
                errorMessage.textContent = `User not found with ID: ${userId.slice(0, 20)}...`;
                errorState.classList.remove('hidden');
                return false;
            }

            // Store user session
            setUserSession(user.id, user);
            
            // Display profile
            document.getElementById('displayUsername').textContent = user.username || 'User';
            document.getElementById('displayEmail').textContent = user.email || 'No email provided';
            document.getElementById('displayUserId').textContent = user.id;
            document.getElementById('displayRole').textContent = user.role || 'Member';
            
            profileDisplay.classList.remove('hidden');
            return true;
        }

        function navigateTo(page) {
            const userId = getCurrentUserId();
            if (!userId) {
                alert('Please load your profile first');
                return;
            }
            window.location.href = `${page}.html?id=${userId}`;
        }

        function copyUserId() {
            const userId = getCurrentUserId();
            if (userId) {
                navigator.clipboard.writeText(userId);
                const btn = document.getElementById('copyUserIdBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-2"></i>Copied!';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            }
        }

        function logout() {
            clearUserSession();
            location.reload();
        }

        // Event Listeners
        document.getElementById('loadProfileBtn').addEventListener('click', async () => {
            const userId = document.getElementById('userIdInput').value.trim();
            if (!userId) {
                alert('Please enter a User ID');
                return;
            }
            await loadProfile(userId);
        });

        document.getElementById('copyUserIdBtn')?.addEventListener('click', copyUserId);

        // Check if already logged in via URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('id');
        if (urlUserId) {
            document.getElementById('userIdInput').value = urlUserId;
            loadProfile(urlUserId);
        }

        // Enter key support
        document.getElementById('userIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loadProfileBtn').click();
        });
    </script>
</body>
</html>
