<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM Panel | My Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">MIM<span class="text-emerald-600">Panel</span></h1>
                <p class="text-gray-500 mt-1">Your Allocated Numbers</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-medium text-gray-800" id="userName">Loading...</p>
                <p class="text-xs text-gray-500" id="userEmail"></p>
                <button onclick="logout()" class="mt-2 text-xs text-red-600 hover:text-red-800">Logout</button>
            </div>
        </div>
    </div>

    <!-- Numbers Display -->
    <div id="numbersContainer" class="bg-white rounded-2xl shadow-sm border p-6">
        <div class="text-center py-8 text-gray-400">Loading your numbers...</div>
    </div>

    <div class="mt-6 text-center text-xs text-gray-400">
        Each OTP earns $0.005 | Contact admin for support
    </div>
</div>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

// Get logged-in user from session
const session = JSON.parse(localStorage.getItem('mima_session') || 'null');

if (!session || session.role !== 'user') {
    window.location.href = '../index.html';
}

// Display user info
document.getElementById('userName').innerText = session.username;
document.getElementById('userEmail').innerText = session.email || 'user@example.com';

function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿'
    };
    return flags[country] || '🌍';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function copyNumber(number) {
    navigator.clipboard.writeText(number);
    alert(`✅ Copied: ${number}`);
}

async function loadUserNumbers() {
    const container = document.getElementById('numbersContainer');
    container.innerHTML = '<div class="text-center py-8 text-gray-400">Loading your numbers...</div>';
    
    try {
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=id,number,last3,country&user_id=eq.${session.userId}`;
        const response = await fetch(url, {
            headers: { 'apikey': API_KEY }
        });
        
        const numbers = await response.json();
        console.log('Numbers loaded:', numbers);
        
        if (!numbers || numbers.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-400">
                    <i class="fas fa-inbox text-4xl mb-2"></i>
                    <p>No numbers allocated yet</p>
                    <p class="text-sm mt-1">Contact admin to get numbers assigned to you</p>
                </div>
            `;
            return;
        }
        
        // Build HTML for each number
        let html = '<div class="space-y-3">';
        
        for (let i = 0; i < numbers.length; i++) {
            const num = numbers[i];
            const flag = getCountryFlag(num.country);
            html += `
                <div class="border border-gray-200 rounded-xl overflow-hidden hover:shadow-md transition">
                    <div class="bg-gray-50 px-4 py-2 border-b">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${flag}</span>
                            <span class="font-semibold text-gray-800">${escapeHtml(num.country)}</span>
                        </div>
                    </div>
                    <div class="px-4 py-3 flex justify-between items-center">
                        <div>
                            <span class="font-mono text-sm">${escapeHtml(num.number)}</span>
                            <span class="text-xs text-gray-400 ml-2">(last3: ${num.last3})</span>
                        </div>
                        <button onclick="copyNumber('${escapeHtml(num.number)}')" 
                            class="text-xs bg-gray-100 hover:bg-emerald-100 px-3 py-1.5 rounded-full transition">
                            <i class="fas fa-copy mr-1"></i>Copy
                        </button>
                    </div>
                </div>
            `;
        }
        
        html += '</div>';
        container.innerHTML = html;
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
            <div class="text-center py-8 text-red-400">
                <i class="fas fa-exclamation-triangle text-4xl mb-2"></i>
                <p>Error loading numbers</p>
                <p class="text-sm mt-1">Please try again later</p>
            </div>
        `;
    }
}

function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}

loadUserNumbers();
</script>
</body>
</html>
