<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | My Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .number-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .number-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .copy-btn {
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background-color: #10b981;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">MIMA<span class="text-emerald-600">Panel</span></h1>
                <p class="text-gray-500 mt-1">Your Allocated Numbers</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-medium text-gray-800" id="userName">Loading...</p>
                <p class="text-xs text-gray-500" id="userEmail"></p>
                <button onclick="logout()" class="mt-2 text-xs text-red-600 hover:text-red-800">Logout</button>
            </div>
        </div>
    </div>

    <!-- Numbers Display - Like Admin Panel -->
    <div id="numbersContainer" class="space-y-4">
        <div class="text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Loading your numbers...</p>
        </div>
    </div>

    <div class="mt-6 text-center text-xs text-gray-400">
        Each OTP earns $0.005 | Contact admin for support
    </div>
</div>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

// Get logged-in user from session
const session = JSON.parse(localStorage.getItem('mima_session') || 'null');

if (!session || session.role !== 'user') {
    window.location.href = '../index.html';
}

// Display user info
document.getElementById('userName').innerText = session.username;
document.getElementById('userEmail').innerText = session.email || 'user@example.com';

function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿'
    };
    return flags[country] || '🌍';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    const btn = event.target.closest('button');
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check mr-1"></i>Copied!';
    btn.classList.add('bg-green-500', 'text-white');
    setTimeout(() => {
        btn.innerHTML = originalHtml;
        btn.classList.remove('bg-green-500', 'text-white');
    }, 1500);
}

async function loadUserNumbers() {
    const container = document.getElementById('numbersContainer');
    
    try {
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=id,number,last3,country&user_id=eq.${session.userId}`;
        const response = await fetch(url, {
            headers: { 'apikey': API_KEY }
        });
        
        const numbers = await response.json();
        console.log('Numbers loaded:', numbers);
        
        if (!numbers || numbers.length === 0) {
            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-200 p-12 text-center">
                    <i class="fas fa-inbox text-5xl text-gray-300 mb-3"></i>
                    <p class="text-gray-400">No numbers allocated yet</p>
                    <p class="text-sm text-gray-400 mt-1">Contact admin to get numbers assigned to you</p>
                </div>
            `;
            return;
        }
        
        // Group by country like admin panel
        const grouped = {};
        numbers.forEach(num => {
            if (!grouped[num.country]) grouped[num.country] = [];
            grouped[num.country].push(num);
        });
        
        let html = '';
        
        for (const country in grouped) {
            const numbersList = grouped[country];
            html += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-6 py-3 border-b border-gray-200">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${getCountryFlag(country)}</span>
                            <h2 class="font-semibold text-gray-800">${escapeHtml(country)}</h2>
                            <span class="text-xs text-gray-400">(${numbersList.length} numbers)</span>
                        </div>
                    </div>
                    <div class="divide-y divide-gray-100">
            `;
            
            for (const num of numbersList) {
                html += `
                    <div class="px-6 py-4 flex justify-between items-center hover:bg-gray-50 transition">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-phone text-gray-400"></i>
                            <div>
                                <span class="font-mono text-sm font-medium text-gray-800">${escapeHtml(num.number)}</span>
                                <span class="text-xs text-gray-400 ml-2">(last3: ${num.last3})</span>
                            </div>
                        </div>
                        <button onclick="copyToClipboard('${escapeHtml(num.number)}')" 
                            class="copy-btn text-xs bg-gray-100 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-full transition">
                            <i class="fas fa-copy mr-1"></i>Copy
                        </button>
                    </div>
                `;
            }
            
            html += `</div></div>`;
        }
        
        container.innerHTML = html;
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
            <div class="bg-white rounded-2xl border border-red-200 p-12 text-center">
                <i class="fas fa-exclamation-triangle text-5xl text-red-400 mb-3"></i>
                <p class="text-red-500">Error loading numbers</p>
                <p class="text-sm text-gray-400 mt-1">Please refresh the page</p>
            </div>
        `;
    }
}

function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}

// Load numbers when page loads
loadUserNumbers();
</script>
</body>
</html>
