<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Test User Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">MIMA<span class="text-emerald-600">Panel</span></h1>
                <p class="text-gray-500 mt-1">Test User Numbers - Login to view allocated numbers</p>
            </div>
        </div>
    </div>

    <!-- Login Form -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">🔐 Login as User</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="loginUsername" placeholder="Username" class="border border-gray-200 rounded-xl px-4 py-2">
            <input type="password" id="loginPassword" placeholder="Password" class="border border-gray-200 rounded-xl px-4 py-2">
            <button id="loginBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700">Login</button>
        </div>
        <div id="loginError" class="mt-3 text-sm text-red-600 hidden"></div>
    </div>

    <!-- User Info Display -->
    <div id="userInfo" class="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 hidden">
        <div class="flex items-center gap-2">
            <i class="fas fa-check-circle text-green-600"></i>
            <span class="font-medium">Logged in as:</span>
            <span id="loggedUsername" class="font-mono"></span>
            <span class="text-gray-400">|</span>
            <span id="loggedUserId" class="text-xs text-gray-500"></span>
        </div>
    </div>

    <!-- Country Filter -->
    <div class="bg-white rounded-2xl shadow-sm border p-4 mb-6 hidden" id="filterSection">
        <label class="block text-sm font-medium text-gray-700 mb-2">Select Country</label>
        <select id="countryFilter" class="w-full md:w-64 border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50">
            <option value="">-- Select Country --</option>
        </select>
    </div>

    <!-- Numbers Display -->
    <div id="numbersContainer" class="bg-white rounded-2xl shadow-sm border p-6">
        <div class="text-center py-12 text-gray-400">
            <i class="fas fa-lock text-4xl mb-2"></i>
            <p>Login to see your allocated numbers</p>
        </div>
    </div>

    <div class="mt-6 text-center text-xs text-gray-400">
        Test users: Gold / gold123 | emily / emily123 | admin1 / pass123
    </div>
</div>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

let currentUserId = null;
let currentUsername = null;
let userNumbers = [];

function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿'
    };
    return flags[country] || '🌍';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function copyNumber(number) {
    navigator.clipboard.writeText(number);
    alert(`✅ Copied: ${number}`);
}

async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    if (!username || !password) {
        errorDiv.textContent = 'Please enter username and password';
        errorDiv.classList.remove('hidden');
        return;
    }
    
    errorDiv.classList.add('hidden');
    
    try {
        // Login - get user info
        const loginUrl = `${SUPABASE_URL}/rest/v1/users?select=id,username,email,role&username=eq.${username}&password=eq.${password}`;
        const res = await fetch(loginUrl, { headers: { 'apikey': API_KEY } });
        const users = await res.json();
        
        if (!users || users.length === 0) {
            errorDiv.textContent = 'Invalid username or password';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        const user = users[0];
        currentUserId = user.id;
        currentUsername = user.username;
        
        // Show user info
        document.getElementById('loggedUsername').innerText = currentUsername;
        document.getElementById('loggedUserId').innerText = currentUserId;
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('filterSection').classList.remove('hidden');
        
        // Load user's numbers
        await loadUserNumbers();
        
    } catch (error) {
        errorDiv.textContent = 'Login error: ' + error.message;
        errorDiv.classList.remove('hidden');
    }
}

async function loadUserNumbers() {
    const container = document.getElementById('numbersContainer');
    container.innerHTML = '<div class="text-center py-8 text-gray-400">Loading numbers...</div>';
    
    try {
        // Get user's allocated numbers
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=id,number,last3,country&user_id=eq.${currentUserId}`;
        const res = await fetch(url, { headers: { 'apikey': API_KEY } });
        userNumbers = await res.json();
        
        console.log(`Numbers for ${currentUsername}:`, userNumbers);
        
        if (!userNumbers || userNumbers.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-inbox text-4xl mb-2"></i>
                    <p>No numbers allocated to ${escapeHtml(currentUsername)}</p>
                    <p class="text-sm mt-1">Contact admin to get numbers assigned</p>
                </div>
            `;
            return;
        }
        
        // Populate country dropdown
        const countries = [...new Set(userNumbers.map(n => n.country))];
        const filterSelect = document.getElementById('countryFilter');
        filterSelect.innerHTML = '<option value="">-- Select Country --</option>' + 
            countries.map(c => `<option value="${c}">${getCountryFlag(c)} ${c}</option>`).join('');
        
        // Auto-select first country and display
        if (countries.length > 0) {
            filterSelect.value = countries[0];
            displayNumbersByCountry(countries[0]);
        }
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
            <div class="text-center py-12 text-red-400">
                <i class="fas fa-exclamation-triangle text-4xl mb-2"></i>
                <p>Error loading numbers: ${error.message}</p>
            </div>
        `;
    }
}

function displayNumbersByCountry(country) {
    const container = document.getElementById('numbersContainer');
    const filteredNumbers = userNumbers.filter(n => n.country === country);
    
    if (filteredNumbers.length === 0) {
        container.innerHTML = `<div class="text-center py-8 text-gray-400">No numbers for ${escapeHtml(country)}</div>`;
        return;
    }
    
    let html = `
        <div class="border rounded-xl overflow-hidden">
            <div class="bg-gray-50 px-4 py-3 border-b">
                <div class="flex items-center gap-2">
                    <span class="text-xl">${getCountryFlag(country)}</span>
                    <h2 class="font-semibold text-gray-800">${escapeHtml(country)}</h2>
                    <span class="text-xs text-gray-400">(${filteredNumbers.length} numbers)</span>
                </div>
            </div>
            <div class="divide-y divide-gray-100">
    `;
    
    for (const num of filteredNumbers) {
        html += `
            <div class="px-4 py-3 flex justify-between items-center hover:bg-gray-50">
                <div class="flex items-center gap-3">
                    <i class="fas fa-phone text-gray-400"></i>
                    <span class="font-mono text-sm">${escapeHtml(num.number)}</span>
                </div>
                <button onclick="copyNumber('${escapeHtml(num.number)}')" 
                    class="text-xs bg-gray-100 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-full transition">
                    <i class="fas fa-copy mr-1"></i>Copy
                </button>
            </div>
        `;
    }
    
    html += `</div></div>`;
    container.innerHTML = html;
}

// Event listeners
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('countryFilter').addEventListener('change', (e) => {
    if (e.target.value) {
        displayNumbersByCountry(e.target.value);
    }
});

// Allow Enter key to login
document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
