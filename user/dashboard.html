<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | My Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .copy-btn {
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background-color: #10b981;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">MIMA<span class="text-emerald-600">Panel</span></h1>
                <p class="text-gray-500 mt-1">Your Allocated Numbers</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-medium text-gray-800" id="userName">Loading...</p>
                <p class="text-xs text-gray-500" id="userEmail"></p>
                <button onclick="logout()" class="mt-2 text-xs text-red-600 hover:text-red-800">Logout</button>
            </div>
        </div>
    </div>

    <!-- Country Filter Dropdown -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Select Country</label>
        <select id="countryFilter" class="w-full md:w-64 border border-gray-200 rounded-xl px-4 py-2.5 bg-gray-50">
            <option value="">-- Select Country --</option>
        </select>
    </div>

    <!-- Numbers Display -->
    <div id="allocationsList" class="space-y-4">
        <div class="text-center py-12 text-gray-400">
            <i class="fas fa-globe text-4xl mb-2"></i>
            <p>Select a country to view your numbers</p>
        </div>
    </div>

    <div class="mt-6 text-center text-xs text-gray-400">
        Each OTP earns $0.005 | Contact admin for support
    </div>
</div>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

// Get logged-in user from session
const session = JSON.parse(localStorage.getItem('mima_session') || 'null');

if (!session || session.role !== 'user') {
    window.location.href = '../index.html';
}

// Display user info
document.getElementById('userName').innerText = session.username;
document.getElementById('userEmail').innerText = session.email || 'user@example.com';

let userNumbers = [];

function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿'
    };
    return flags[country] || '🌍';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    alert(`✅ Copied: ${text}`);
}

// Load and display allocated numbers - Same format as admin panel
async function loadAllocatedNumbers() {
    const filterCountry = document.getElementById('countryFilter').value;
    
    if (!filterCountry) {
        document.getElementById('allocationsList').innerHTML = `
            <div class="text-center py-12 text-gray-400">
                <i class="fas fa-globe text-4xl mb-2"></i>
                <p>Select a country to view your numbers</p>
            </div>
        `;
        return;
    }
    
    // Filter by user ID and country
    const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=id,number,last3,country&user_id=eq.${session.userId}&country=eq.${filterCountry}`;
    
    const res = await fetch(url, { headers: { 'apikey': API_KEY } });
    const allocations = await res.json();
    const container = document.getElementById('allocationsList');
    
    if (allocations.length === 0) {
        container.innerHTML = `<div class="text-center py-8 text-gray-400">No numbers for ${escapeHtml(filterCountry)}</div>`;
        return;
    }
    
    // Build HTML - Same style as admin panel
    let html = `
        <div class="border rounded-xl overflow-hidden">
            <div class="bg-gray-50 px-4 py-2 flex justify-between items-center">
                <div>
                    <span class="font-semibold">${getCountryFlag(filterCountry)} ${escapeHtml(filterCountry)}</span>
                    <span class="ml-2 text-sm text-gray-500">${allocations.length} numbers</span>
                </div>
            </div>
            <div class="p-3 flex flex-wrap gap-2">
    `;
    
    for (const item of allocations) {
        html += `
            <div class="bg-gray-100 rounded-lg px-3 py-1.5 flex items-center gap-2">
                <span class="font-mono text-sm">${escapeHtml(item.number)}</span>
                <button onclick="copyToClipboard('${escapeHtml(item.number)}')" class="text-green-600 hover:text-green-800">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        `;
    }
    
    html += `</div></div>`;
    container.innerHTML = html;
}

// Load countries for dropdown
async function loadCountries() {
    try {
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=country&user_id=eq.${session.userId}`;
        const res = await fetch(url, { headers: { 'apikey': API_KEY } });
        const data = await res.json();
        
        // Get unique countries
        const countries = [...new Set(data.map(item => item.country))];
        const filterSelect = document.getElementById('countryFilter');
        
        if (countries.length === 0) {
            filterSelect.innerHTML = '<option value="">-- No numbers allocated --</option>';
            document.getElementById('allocationsList').innerHTML = `
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-inbox text-4xl mb-2"></i>
                    <p>No numbers allocated yet</p>
                    <p class="text-sm mt-1">Contact admin to get numbers assigned to you</p>
                </div>
            `;
            return;
        }
        
        filterSelect.innerHTML = '<option value="">-- Select Country --</option>' + 
            countries.map(c => `<option value="${c}">${getCountryFlag(c)} ${c}</option>`).join('');
        
    } catch (error) {
        console.error('Error loading countries:', error);
    }
}

function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}

// Event listener for country filter
document.getElementById('countryFilter').addEventListener('change', (e) => {
    loadAllocatedNumbers();
});

// Initialize
loadCountries();
</script>
</body>
</html>
