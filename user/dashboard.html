<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>.page{display:none;}.page.active-page{display:block;}.hidden-dropdown{display:none;}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4"><div class="flex justify-between h-16"><div class="flex items-center"><div class="h-8 w-8 rounded-lg bg-emerald-600"><i class="fas fa-chart-line text-white"></i></div><span class="ml-2 text-xl font-bold">MIMA<span class="text-emerald-600">Panel</span></span><span class="ml-3 text-xs bg-emerald-100 text-emerald-600 px-2 py-1 rounded-full">User</span></div><div class="relative"><button id="menuBtn" class="bg-gray-100 rounded-full px-3 py-2"><i class="fas fa-user-circle"></i><i class="fas fa-chevron-down text-xs"></i></button><div id="dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border hidden-dropdown"><a href="#" data-page="allocation" class="block px-4 py-2">📌 Allocation</a><a href="#" data-page="today" class="block px-4 py-2">📊 Today's Stat</a><a href="#" data-page="total" class="block px-4 py-2">💰 Total OTP</a><a href="#" data-page="past" class="block px-4 py-2">📅 Past Records</a><div class="border-t"></div><a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600">Logout</a></div></div></div></div></nav>

<main class="max-w-7xl mx-auto px-4 py-8">
<div id="allocationPage" class="page"><h1 class="text-2xl font-bold">📌 Number Allocation</h1><select id="countrySelect" class="w-full md:w-64 border rounded-xl px-4 py-2 my-4"><option value="">-- Select Country --</option></select><div id="numbersDisplay" class="bg-white rounded-2xl border p-6 text-center text-gray-400">Select a country</div></div>
<div id="todayPage" class="page"><h1 class="text-2xl font-bold">📊 Today's OTP</h1><div class="bg-white rounded-2xl border mt-4"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3">Number</th><th class="px-6 py-3">Sender</th><th class="px-6 py-3">Code</th><th class="px-6 py-3">Time</th></tr></thead><tbody id="todayTable"></tbody></table><div id="todayEmpty" class="text-center py-8 text-gray-400 hidden">No OTPs today</div></div></div>
<div id="totalPage" class="page"><h1 class="text-2xl font-bold">💰 Total OTP</h1><div class="grid grid-cols-2 gap-6 mt-4"><div class="bg-emerald-600 rounded-2xl p-6"><p class="text-emerald-100">Total OTP Today</p><p class="text-white text-4xl font-bold" id="totalCount">0</p></div><div class="bg-amber-600 rounded-2xl p-6"><p class="text-amber-100">Earnings</p><p class="text-white text-4xl font-bold" id="totalEarn">$0.00</p><p class="text-amber-100 text-sm">$0.005/OTP</p></div></div></div>
<div id="pastPage" class="page"><h1 class="text-2xl font-bold">📅 Past Records</h1><div class="grid grid-cols-2 gap-4 my-4"><input type="date" id="startDate" class="border rounded-xl px-4 py-2"><input type="date" id="endDate" class="border rounded-xl px-4 py-2"></div><button id="fetchBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl">Fetch</button><div class="bg-white rounded-2xl border mt-4"><div class="p-3 border-b flex justify-between"><span class="font-semibold">Records</span><span id="pastEarn" class="text-emerald-600">$0.00</span></div><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-2">Date</th><th class="px-4 py-2">Number</th><th class="px-4 py-2">Code</th><th class="px-4 py-2">Time</th> </thead><tbody id="pastTable"></tbody></table><div id="pastEmpty" class="text-center py-8 text-gray-400 hidden">No records</div></div></div></main>
<button id="addOtpBtn" class="fixed bottom-6 right-6 bg-emerald-600 text-white p-4 rounded-full shadow-lg"><i class="fas fa-plus"></i></button>

<script src="../js/data.js"></script><script src="../js/auth.js"></script>
<script>
if(!requireUserAuth()){}let currentUser=getCurrentUser();let userNumbers=[];let userOtps=[];
function getCountryFlag(c){const f={Jordan:'🇯🇴',Tajikistan:'🇹🇯',Nigeria:'🇳🇬',Myanmar:'🇲🇲',Hungary:'🇭🇺',Slovenia:'🇸🇮',Venezuela:'🇻🇪',Uzbekistan:'🇺🇿'};return f[c]||'🌍';}
function loadUserNumbers(){const a=JSON.parse(localStorage.getItem('mima_analytics_numbers')||'[]');userNumbers=a.filter(n=>n.userId===currentUser.userId);const countries=[...new Set(userNumbers.map(n=>n.country))];const sel=document.getElementById('countrySelect');if(sel)sel.innerHTML='<option value="">-- Select Country --</option>'+countries.map(c=>`<option value="${c}">${getCountryFlag(c)} ${c}</option>`).join('');}
function displayNumbers(country){const data=userNumbers.find(n=>n.country===country);const div=document.getElementById('numbersDisplay');if(!data||!data.numbers||data.numbers.length===0){div.innerHTML='<div class="text-center py-8">No numbers</div>';return;}div.innerHTML=`<div class="border rounded-xl"><div class="bg-gray-50 px-4 py-2">${getCountryFlag(country)} ${country}</div><div class="divide-y">${data.numbers.map(num=>`<div class="px-4 py-2 font-mono">${escapeHtml(num)}</div>`).join('')}</div></div>`;}
async function loadOtps(){try{const r=await fetch('/data/otp_logs.json');if(r.ok){const all=await r.json();localStorage.setItem('mima_all_otps',JSON.stringify(all));const userNum=JSON.parse(localStorage.getItem('mima_analytics_numbers')||'[]');const userEntries=userNum.filter(n=>n.userId===currentUser.userId);const last4s=[];userEntries.forEach(e=>{if(e.numbers){e.numbers.forEach(num=>{const clean=num.replace(/\D/g,'');if(clean.length>=4)last4s.push(clean.slice(-4));});}});userOtps=all.filter(o=>last4s.includes(o.phone_last4));userOtps.sort((a,b)=>b.timestamp-a.timestamp);localStorage.setItem(`mima_otp_${currentUser.userId}`,JSON.stringify(userOtps));return userOtps;}}catch(e){}const stored=localStorage.getItem(`mima_otp_${currentUser.userId}`);userOtps=stored?JSON.parse(stored):[];return userOtps;}
function renderToday(){const today=getTodayStr();const todayOtps=userOtps.filter(o=>o.date===today);const tbody=document.getElementById('todayTable');const empty=document.getElementById('todayEmpty');if(todayOtps.length===0){tbody.innerHTML='';if(empty)empty.classList.remove('hidden');return;}if(empty)empty.classList.add('hidden');tbody.innerHTML=todayOtps.map(o=>`<tr><td class="px-6 py-3 font-mono">***${o.phone_last4||'????'}Js<td>${o.sender||'Bot'}Js<td class="font-bold text-emerald-600">${o.otp}Js<td class="text-gray-500">${o.time||''}Js</tr>`).join('');}
function updateTotal(){const today=getTodayStr();const c=userOtps.filter(o=>o.date===today).length;document.getElementById('totalCount').textContent=c;document.getElementById('totalEarn').textContent=`$${(c*0.005).toFixed(2)}`;}
function fetchPast(){const start=document.getElementById('startDate').value;const end=document.getElementById('endDate').value;if(!start||!end)return;const filtered=userOtps.filter(o=>o.date>=start&&o.date<=end);const tbody=document.getElementById('pastTable');const empty=document.getElementById('pastEmpty');const earnSpan=document.getElementById('pastEarn');if(filtered.length===0){tbody.innerHTML='';if(empty)empty.classList.remove('hidden');if(earnSpan)earnSpan.textContent='$0.00';return;}if(empty)empty.classList.add('hidden');if(earnSpan)earnSpan.textContent=`$${(filtered.length*0.005).toFixed(2)}`;tbody.innerHTML=filtered.map(o=>`<tr><td class="px-4 py-2 text-xs">${o.date}Js<td class="font-mono">***${o.phone_last4||'????'}Js<td class="font-bold text-emerald-600">${o.otp}Js<td class="text-gray-500">${o.time||''}Js</tr>`).join('');}
async function refresh(){await loadOtps();renderToday();updateTotal();fetchPast();}
function addTest(){const last4=prompt("Last 4 digits:","4567");const code=prompt("OTP code:","123456");const sender=prompt("Sender:","Test");if(last4&&code){const now=new Date();const newOtp={id:Date.now(),otp:code,phone_last4:last4,sender:sender,timestamp:now.getTime(),date:now.toISOString().slice(0,10),time:now.toLocaleTimeString()};let all=JSON.parse(localStorage.getItem('mima_all_otps')||'[]');all.push(newOtp);localStorage.setItem('mima_all_otps',JSON.stringify(all));refresh();alert(`✅ Added! OTP ${code} for ***${last4}`);}}
document.addEventListener('DOMContentLoaded',async()=>{initData();document.getElementById('userName').innerText=currentUser.username;document.getElementById('userEmail').innerText=currentUser.email;loadUserNumbers();await loadOtps();const end=new Date();const start=new Date();start.setDate(end.getDate()-6);document.getElementById('startDate').value=start.toISOString().slice(0,10);document.getElementById('endDate').value=end.toISOString().slice(0,10);document.getElementById('countrySelect').onchange=e=>{if(e.target.value)displayNumbers(e.target.value);};document.getElementById('fetchBtn').onclick=fetchPast;document.getElementById('addOtpBtn').onclick=addTest;renderToday();updateTotal();fetchPast();
const pages=['allocation','today','total','past'];pages.forEach(p=>{document.querySelectorAll(`[data-page="${p}"]`).forEach(link=>{link.onclick=e=>{e.preventDefault();pages.forEach(x=>document.getElementById(x+'Page').classList.remove('active-page'));document.getElementById(p+'Page').classList.add('active-page');document.getElementById('dropdown').classList.add('hidden-dropdown');if(p==='allocation')loadUserNumbers();if(p==='today')renderToday();if(p==='total')updateTotal();if(p==='past')fetchPast();};});});document.getElementById('allocationPage').classList.add('active-page');
const menu=document.getElementById('menuBtn');const drop=document.getElementById('dropdown');menu.onclick=e=>{e.stopPropagation();drop.classList.toggle('hidden-dropdown');};document.addEventListener('click',()=>drop.classList.add('hidden-dropdown'));document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();userLogout();};});</script>
</body>
</html>
