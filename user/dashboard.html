<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center">
            <div class="h-8 w-8 rounded-lg bg-emerald-600 flex items-center justify-center">
                <i class="fas fa-chart-line text-white text-sm"></i>
            </div>
            <span class="ml-2 text-xl font-bold">MIMA<span class="text-emerald-600">Panel</span></span>
            <span class="ml-3 text-xs bg-emerald-100 text-emerald-600 px-2 py-1 rounded-full">User</span>
        </div>
        <button onclick="logout()" class="text-red-600"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-4">📌 My Allocated Numbers</h1>
    
    <div id="numbersList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="text-center py-8 text-gray-400 col-span-full">Loading...</div>
    </div>
</main>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

// Get session
const session = JSON.parse(localStorage.getItem('mima_session') || 'null');
if (!session || session.role !== 'user') {
    window.location.href = '../index.html';
}

const userId = session.userId;
console.log('User ID:', userId);

async function loadNumbers() {
    const container = document.getElementById('numbersList');
    container.innerHTML = '<div class="text-center py-8 text-gray-400 col-span-full">Loading...</div>';
    
    try {
        const url = `${SUPABASE_URL}/rest/v1/allocated_numbers?select=*&user_id=eq.${userId}`;
        console.log('Fetching URL:', url);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'apikey': API_KEY,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const numbers = await response.json();
        console.log('Numbers found:', numbers.length);
        
        if (numbers.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-400 col-span-full">
                    <i class="fas fa-inbox text-4xl mb-2"></i>
                    <p>No numbers allocated yet</p>
                    <p class="text-sm mt-1">Contact admin to get numbers assigned to you</p>
                </div>
            `;
            return;
        }
        
        // Group by country
        const grouped = {};
        numbers.forEach(num => {
            if (!grouped[num.country]) grouped[num.country] = [];
            grouped[num.country].push(num);
        });
        
        let html = '';
        for (const country in grouped) {
            html += `
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-4 py-2 border-b">
                        <span class="font-semibold">${getCountryFlag(country)} ${country}</span>
                        <span class="text-xs text-gray-400 ml-2">${grouped[country].length} numbers</span>
                    </div>
                    <div class="divide-y divide-gray-100">
            `;
            
            grouped[country].forEach(num => {
                html += `
                    <div class="px-4 py-3 flex justify-between items-center hover:bg-gray-50">
                        <span class="font-mono text-sm">${escapeHtml(num.number)}</span>
                        <button onclick="copyNumber('${escapeHtml(num.number)}')" 
                            class="text-xs bg-gray-100 hover:bg-green-100 px-3 py-1 rounded-full transition">
                            <i class="fas fa-copy mr-1"></i>Copy
                        </button>
                    </div>
                `;
            });
            
            html += `</div></div>`;
        }
        
        container.innerHTML = html;
        
    } catch (error) {
        console.error('Error details:', error);
        container.innerHTML = `
            <div class="text-center py-8 text-red-400 col-span-full">
                <i class="fas fa-exclamation-triangle text-4xl mb-2"></i>
                <p>Error loading numbers: ${error.message}</p>
                <p class="text-sm mt-1">Check console for details</p>
            </div>
        `;
    }
}

function getCountryFlag(country) {
    const flags = {
        'Jordan': '🇯🇴', 'Tajikistan': '🇹🇯', 'Nigeria': '🇳🇬',
        'Myanmar': '🇲🇲', 'Hungary': '🇭🇺', 'Slovenia': '🇸🇮',
        'Venezuela': '🇻🇪', 'Uzbekistan': '🇺🇿'
    };
    return flags[country] || '🌍';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

function copyNumber(text) {
    navigator.clipboard.writeText(text);
    alert(`✅ Copied: ${text}`);
}

function logout() {
    localStorage.removeItem('mima_session');
    window.location.href = '../index.html';
}

// Load numbers when page loads
loadNumbers();
</script>
</body>
</html>
