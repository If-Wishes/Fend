<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPanel | Today's Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f9fafb; }
        .otp-row:hover { background: #fef3c7; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <div class="h-8 w-8 rounded-lg bg-emerald-600 flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-sm"></i>
                    </div>
                    <span class="ml-2 text-xl font-bold text-gray-800">Nexus<span class="text-emerald-600">Panel</span></span>
                </div>
                <a href="profile.html" class="text-gray-600 hover:text-emerald-600">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Profile
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">📊 Today's OTP Statistics</h1>
            <p class="text-gray-500 mt-1">OTP received today from your numbers</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left font-semibold text-gray-600">Number</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-600">Sender</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-600">Code</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-600">Time</th>
                        </tr>
                    </thead>
                    <tbody id="todayOtpTable" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div id="todayEmptyMsg" class="text-center py-8 text-gray-400 hidden">
                <i class="fas fa-inbox text-4xl mb-2"></i>
                <p>No OTP received today</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
        const SUPABASE_API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';

        function getUserIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function getTodayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
        }

        async function fetchUserOtps(userId) {
            try {
                const url = `${SUPABASE_URL}/rest/v1/otp_logs?select=*&user_id=eq.${encodeURIComponent(userId)}&order=timestamp.desc`;
                const response = await fetch(url, { headers: { 'apikey': SUPABASE_API_KEY } });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data || [];
            } catch (err) {
                console.error("Fetch OTPs error:", err);
                return [];
            }
        }

        async function loadTodayStats() {
            const userId = getUserIdFromUrl();
            if (!userId) {
                document.getElementById('todayOtpTable').innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-500">No User ID provided. Please go to Profile first.</td></tr>';
                return;
            }

            const userOtps = await fetchUserOtps(userId);
            const today = getTodayStr();
            const todayOtps = userOtps.filter(o => o.date === today);
            const tbody = document.getElementById('todayOtpTable');
            const emptyMsg = document.getElementById('todayEmptyMsg');

            if (todayOtps.length === 0) {
                tbody.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                return;
            }
            emptyMsg.classList.add('hidden');

            tbody.innerHTML = todayOtps.map(o => `
                <tr class="otp-row border-b border-gray-100 hover:bg-amber-50">
                    <td class="px-6 py-3 font-mono">***${escapeHtml(o.phone_last4 || '????')}</td>
                    <td class="px-6 py-3">${escapeHtml(o.sender || 'Bot')}</td>
                    <td class="px-6 py-3 font-bold text-emerald-600">${escapeHtml(o.otp)}</td>
                    <td class="px-6 py-3 text-gray-500">${o.time || ''}</td>
                </tr>
            `).join('');
        }

        loadTodayStats();
    </script>
</body>
</html>
